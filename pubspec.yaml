name: chompire
description: "Chompire — an original Pac-Man-style maze-chase game (Flutter + Flame)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # 2D game engine: game loop, component tree, sprites, collision, tilemaps.
  # Pinned to 1.35.x: 1.36+ requires Dart >=3.11 / Flutter >=3.41; the toolchain
  # here is Dart 3.10.8 / Flutter 3.38.9. Bump when the SDK is upgraded.
  flame: ^1.35.1

  # Offline key-value persistence (high score, settings). No network.
  shared_preferences: ^2.3.2

  cupertino_icons: ^1.0.8
  flame_audio: ^2.11.14

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Generates platform launcher icons from a single master image.
  # Release-prep tooling only; not used at runtime.
  flutter_launcher_icons: ^0.14.4

# Launcher icon generation config. Run: dart run flutter_launcher_icons
# Master art and adaptive foreground are produced by the Designer.
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  adaptive_icon_background: "#0B0B1A"
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#0B0B1A"
    theme_color: "#0B0B1A"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sprites/
    - assets/tiles/
    - assets/audio/

  # The pixel/arcade font is bundled by the Designer in the polish phase.
  # Uncomment once assets/fonts/PressStart2P-Regular.ttf is added.
  # fonts:
  #   - family: PressStart2P
  #     fonts:
  #       - asset: assets/fonts/PressStart2P-Regular.ttf
